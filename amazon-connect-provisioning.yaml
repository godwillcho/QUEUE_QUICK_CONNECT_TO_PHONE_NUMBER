AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Amazon Connect Queue and Quick Connect Provisioning System.
  Automatically provisions queues and quick connects from CSV files uploaded to S3.
  Default Stack Name: connect-queue-provisioning

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Amazon Connect Configuration"
        Parameters:
          - ConnectInstanceId
          - ConnectInstanceArn
          - HoursOfOperationId
          - TransferContactFlowId
      - Label:
          default: "Environment Settings"
        Parameters:
          - Environment
          - DeployId
          - LogRetentionDays

# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:
  ConnectInstanceId:
    Type: String
    Description: Amazon Connect Instance ID
    Default: '9b50ddcc-8510-441e-a9c8-96e9e9281105'

  ConnectInstanceArn:
    Type: String
    Description: Amazon Connect Instance ARN
    Default: 'arn:aws:connect:us-east-1:551642657889:instance/9b50ddcc-8510-441e-a9c8-96e9e9281105'

  HoursOfOperationId:
    Type: String
    Description: Hours of Operation ID for queue creation
    Default: '0701af49-c81b-4516-ad6d-86940e98a66a'

  Environment:
    Type: String
    Description: Deployment environment
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  DeployId:
    Type: String
    Description: Short unique ID to distinguish deployments (max 10 chars, e.g. v1, v2, blue)
    Default: v1
    MaxLength: 10
    AllowedPattern: '[a-z0-9]+'

  LogRetentionDays:
    Type: Number
    Description: CloudWatch Logs retention period in days
    Default: 30

# =============================================================================
# RESOURCES
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # DynamoDB Table
  # ---------------------------------------------------------------------------
  QueueMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'connect-queue-metadata-${Environment}-${DeployId}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: QueueName
          AttributeType: S
      KeySchema:
        - AttributeName: QueueName
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  # ---------------------------------------------------------------------------
  # IAM Role for Provisioning Lambda
  # ---------------------------------------------------------------------------
  ProvisioningLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::connect-queue-provisioning-${AWS::AccountId}-${Environment}-${DeployId}/*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource: !GetAtt QueueMetadataTable.Arn
        - PolicyName: ConnectAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - connect:CreateQueue
                  - connect:CreateQuickConnect
                  - connect:ListQueues
                  - connect:ListQuickConnects
                  - connect:ListContactFlows
                  - connect:AssociateQueueQuickConnects
                Resource:
                  - !Sub 'arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}'
                  - !Sub 'arn:aws:connect:${AWS::Region}:${AWS::AccountId}:instance/${ConnectInstanceId}/*'

  # ---------------------------------------------------------------------------
  # Provisioning Lambda Function
  # ---------------------------------------------------------------------------
  ProvisioningLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'connect-queue-provisioning-${Environment}-${DeployId}'
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt ProvisioningLambdaRole.Arn
      Environment:
        Variables:
          CONNECT_INSTANCE_ID: !Ref ConnectInstanceId
          CONNECT_INSTANCE_ARN: !Ref ConnectInstanceArn
          HOURS_OF_OPERATION_ID: !Ref HoursOfOperationId
          TRANSFER_FLOW_NAME: !Sub 'Queue Transfer Flow - ${Environment}-${DeployId}'
          DYNAMODB_TABLE_NAME: !Ref QueueMetadataTable
      Code:
        ZipFile: |
          import boto3
          import csv
          import io
          import logging
          import os
          import re
          import time
          from datetime import datetime, timezone
          from botocore.exceptions import ClientError

          logger = logging.getLogger()
          logger.setLevel(logging.ERROR)

          CONNECT_INSTANCE_ID = os.environ['CONNECT_INSTANCE_ID']
          CONNECT_INSTANCE_ARN = os.environ['CONNECT_INSTANCE_ARN']
          HOURS_OF_OPERATION_ID = os.environ['HOURS_OF_OPERATION_ID']
          TRANSFER_FLOW_NAME = os.environ['TRANSFER_FLOW_NAME']
          DYNAMODB_TABLE_NAME = os.environ['DYNAMODB_TABLE_NAME']

          s3 = boto3.client('s3')
          connect = boto3.client('connect')
          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(DYNAMODB_TABLE_NAME)

          _transfer_flow_id = None


          def get_transfer_flow_id():
              global _transfer_flow_id
              if _transfer_flow_id:
                  return _transfer_flow_id
              try:
                  paginator = connect.get_paginator('list_contact_flows')
                  for page in paginator.paginate(InstanceId=CONNECT_INSTANCE_ID, ContactFlowTypes=['QUEUE_TRANSFER']):
                      for flow in page.get('ContactFlowSummaryList', []):
                          if flow['Name'] == TRANSFER_FLOW_NAME:
                              _transfer_flow_id = flow['Id']
                              return _transfer_flow_id
              except ClientError as e:
                  logger.error(f"Failed to get transfer flow: {e}")
              raise ValueError(f"Transfer flow '{TRANSFER_FLOW_NAME}' not found")


          def is_phone_number(value):
              cleaned = re.sub(r'[\s\-\(\)\.\+]', '', value)
              return cleaned.isdigit() and len(cleaned) >= 7


          def normalize_phone(phone):
              if not phone:
                  return None
              cleaned = re.sub(r'[^\d+]', '', phone)
              if cleaned.startswith('+'):
                  return cleaned
              elif len(cleaned) == 10:
                  return f"+1{cleaned}"
              elif len(cleaned) == 11 and cleaned.startswith('1'):
                  return f"+{cleaned}"
              return None


          def build_queue_arn(queue_id):
              parts = CONNECT_INSTANCE_ARN.split(':')
              region = parts[3]
              account = parts[4]
              return f"arn:aws:connect:{region}:{account}:instance/{CONNECT_INSTANCE_ID}/queue/{queue_id}"


          def extract_flow_id_from_arn(flow_arn):
              return flow_arn.strip().split('/')[-1]


          BATCH_SIZE = 10
          API_DELAY = 0.5
          BATCH_DELAY = 3
          PROPAGATION_DELAY = 5


          def chunked(lst, size):
              for i in range(0, len(lst), size):
                  yield lst[i:i + size]


          SUCCESS_FIELDS = [
              'QueueName', 'TransferType', 'TransferDestination',
              'QueueArn', 'QuickConnectName', 'PhoneNumberE164',
              'TargetQueueArn', 'CallerIdE164', 'AssociatedQueueName',
              'TransferFlowArn', 'CreatedAt'
          ]
          FAILURE_FIELDS = [
              'QueueName', 'TransferDestination', 'AssociateToQueue',
              'CallerID', 'TransferFlowArn', 'Error'
          ]


          def write_results_csv(bucket, run_folder, filename, fields, rows):
              if not rows:
                  buf = io.StringIO()
                  writer = csv.DictWriter(buf, fieldnames=fields)
                  writer.writeheader()
                  content = buf.getvalue()
              else:
                  buf = io.StringIO()
                  writer = csv.DictWriter(buf, fieldnames=fields, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(rows)
                  content = buf.getvalue()
              s3.put_object(
                  Bucket=bucket,
                  Key=f"{run_folder}/{filename}",
                  Body=content.encode('utf-8'),
                  ContentType='text/csv'
              )


          def lambda_handler(event, context):
              results = {'processed': 0, 'success': 0, 'failed': 0}
              success_rows = []
              failure_rows = []

              try:
                  existing_queues = get_existing_queues()
                  default_flow_id = get_transfer_flow_id()

                  for record in event.get('Records', []):
                      bucket = record['s3']['bucket']['name']
                      key = record['s3']['object']['key']

                      # Build run folder name from timestamp + CSV filename
                      csv_filename = key.split('/')[-1].rsplit('.', 1)[0]
                      run_ts = datetime.now(timezone.utc).strftime('%Y-%m-%d_%H-%M-%S')
                      run_folder = f"results/{run_ts}_{csv_filename}"

                      response = s3.get_object(Bucket=bucket, Key=key)
                      content = response['Body'].read().decode('utf-8')
                      reader = csv.DictReader(io.StringIO(content))
                      rows = list(reader)

                      # Parse all rows
                      parsed_rows = []
                      for row in rows:
                          results['processed'] += 1
                          try:
                              queue_name = row['QueueName'].strip()
                              destination = row.get('TransferDestination', '').strip()
                              assoc_queue = row.get('AssociateToQueue', '').strip()
                              caller_id = row.get('CallerID', '').strip()
                              transfer_flow_arn = row.get('TransferFlowArn', '').strip()
                              transfer_type = 'PHONE' if is_phone_number(destination) else 'QUEUE'
                              parsed_rows.append({
                                  'name': queue_name,
                                  'destination': destination,
                                  'transfer_type': transfer_type,
                                  'assoc': assoc_queue,
                                  'caller_id': caller_id,
                                  'transfer_flow_arn': transfer_flow_arn,
                                  'raw_row': row
                              })
                          except Exception as e:
                              results['failed'] += 1
                              fail = dict(row)
                              fail['Error'] = str(e)
                              failure_rows.append(fail)
                              logger.error(f"Parse error: {e}")

                      # Process in batches
                      existing_qcs = get_existing_quick_connects()
                      for batch_num, batch in enumerate(chunked(parsed_rows, BATCH_SIZE)):
                          if batch_num > 0:
                              time.sleep(BATCH_DELAY)

                          # Phase 1: Create queues for this batch
                          batch_data = []
                          for row in batch:
                              try:
                                  queue_id = create_queue(row['name'], existing_queues)
                                  if queue_id:
                                      row['id'] = queue_id
                                      batch_data.append(row)
                                  else:
                                      results['failed'] += 1
                                      fail = dict(row['raw_row'])
                                      fail['Error'] = 'Failed to create queue'
                                      failure_rows.append(fail)
                                  time.sleep(API_DELAY)
                              except Exception as e:
                                  results['failed'] += 1
                                  fail = dict(row['raw_row'])
                                  fail['Error'] = str(e)
                                  failure_rows.append(fail)
                                  logger.error(f"Queue error: {e}")

                          # Wait for propagation
                          if batch_data:
                              time.sleep(PROPAGATION_DELAY)
                              existing_queues = get_existing_queues()

                          # Phase 2: Create quick connects for this batch
                          for data in batch_data:
                              try:
                                  if data['transfer_type'] == 'PHONE':
                                      flow_id = default_flow_id
                                      target_queue_id = data['id']
                                  else:
                                      target_queue_name = data['destination']
                                      target_queue_id = existing_queues.get(target_queue_name)
                                      if not target_queue_id:
                                          err = f"Destination queue not found: {target_queue_name}"
                                          logger.error(err)
                                          results['failed'] += 1
                                          fail = dict(data['raw_row'])
                                          fail['Error'] = err
                                          failure_rows.append(fail)
                                          continue
                                      if data['transfer_flow_arn']:
                                          flow_id = extract_flow_id_from_arn(data['transfer_flow_arn'])
                                      else:
                                          flow_id = default_flow_id

                                  qc_id = create_quick_connect(
                                      data['name'], target_queue_id, flow_id, existing_qcs
                                  )
                                  time.sleep(API_DELAY)

                                  if qc_id and data['assoc']:
                                      associate_qc(qc_id, data['assoc'], existing_queues)
                                      time.sleep(API_DELAY)

                                  db_item = save_to_db(data, existing_queues, qc_id)
                                  results['success'] += 1
                                  success_rows.append(db_item)
                              except Exception as e:
                                  results['failed'] += 1
                                  fail = dict(data['raw_row'])
                                  fail['Error'] = str(e)
                                  failure_rows.append(fail)
                                  logger.error(f"QC error: {e}")

                      # Write result files
                      write_results_csv(bucket, run_folder, 'success.csv', SUCCESS_FIELDS, success_rows)
                      write_results_csv(bucket, run_folder, 'failure.csv', FAILURE_FIELDS, failure_rows)

                  results['results_folder'] = run_folder if parsed_rows else None
                  return results
              except Exception as e:
                  logger.error(f"Fatal: {e}")
                  raise


          def get_existing_queues():
              queues = {}
              paginator = connect.get_paginator('list_queues')
              for page in paginator.paginate(InstanceId=CONNECT_INSTANCE_ID, QueueTypes=['STANDARD']):
                  for q in page.get('QueueSummaryList', []):
                      queues[q['Name']] = q['Id']
              return queues


          def create_queue(name, existing):
              if name in existing:
                  return existing[name]
              try:
                  resp = connect.create_queue(
                      InstanceId=CONNECT_INSTANCE_ID,
                      Name=name,
                      Description=f"Queue for {name}",
                      HoursOfOperationId=HOURS_OF_OPERATION_ID
                  )
                  existing[name] = resp['QueueId']
                  return resp['QueueId']
              except connect.exceptions.DuplicateResourceException:
                  for q in get_existing_queues().items():
                      if q[0] == name:
                          return q[1]
              except ClientError as e:
                  logger.error(f"Create queue error: {e}")
              return None


          def get_existing_quick_connects():
              qcs = {}
              paginator = connect.get_paginator('list_quick_connects')
              for page in paginator.paginate(InstanceId=CONNECT_INSTANCE_ID, QuickConnectTypes=['QUEUE']):
                  for qc in page.get('QuickConnectSummaryList', []):
                      qcs[qc['Name']] = qc['Id']
              return qcs


          def create_quick_connect(name, queue_id, flow_id, existing_qcs):
              if name in existing_qcs:
                  return existing_qcs[name]
              try:
                  resp = connect.create_quick_connect(
                      InstanceId=CONNECT_INSTANCE_ID,
                      Name=name,
                      Description=f"QC for {name}",
                      QuickConnectConfig={
                          'QuickConnectType': 'QUEUE',
                          'QueueConfig': {
                              'QueueId': queue_id,
                              'ContactFlowId': flow_id
                          }
                      }
                  )
                  return resp['QuickConnectId']
              except connect.exceptions.DuplicateResourceException:
                  refreshed = get_existing_quick_connects()
                  return refreshed.get(name)
              except ClientError as e:
                  logger.error(f"Create QC error: {e}")
              return None


          def associate_qc(qc_id, target_name, existing):
              target_id = existing.get(target_name)
              if not target_id:
                  logger.error(f"Target queue not found: {target_name}")
                  return
              try:
                  connect.associate_queue_quick_connects(
                      InstanceId=CONNECT_INSTANCE_ID,
                      QueueId=target_id,
                      QuickConnectIds=[qc_id]
                  )
              except ClientError as e:
                  logger.error(f"Associate error: {e}")


          def save_to_db(data, existing_queues, qc_id=None):
              queue_arn = build_queue_arn(data['id'])
              caller_id_e164 = normalize_phone(data['caller_id'])

              item = {
                  'QueueName': data['name'],
                  'QueueArn': queue_arn,
                  'QuickConnectName': data['name'],
                  'AssociatedQueueName': data['assoc'],
                  'TransferType': data['transfer_type'],
                  'TransferDestination': data['destination'],
                  'CallerIdE164': caller_id_e164 or '',
                  'CreatedAt': datetime.now(timezone.utc).isoformat()
              }

              if qc_id:
                  item['QuickConnectId'] = qc_id

              if data['transfer_type'] == 'PHONE':
                  phone_e164 = normalize_phone(data['destination'])
                  if phone_e164:
                      item['PhoneNumberE164'] = phone_e164
              else:
                  target_queue_id = existing_queues.get(data['destination'])
                  if target_queue_id:
                      item['TargetQueueArn'] = build_queue_arn(target_queue_id)
                  if data['transfer_flow_arn']:
                      item['TransferFlowArn'] = data['transfer_flow_arn']

              table.put_item(Item=item)
              return item

  # ---------------------------------------------------------------------------
  # Lambda Permission for S3
  # ---------------------------------------------------------------------------
  LambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProvisioningLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::connect-queue-provisioning-${AWS::AccountId}-${Environment}-${DeployId}'

  # ---------------------------------------------------------------------------
  # S3 Bucket with Notification
  # ---------------------------------------------------------------------------
  ProvisioningBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaS3Permission
    Properties:
      BucketName: !Sub 'connect-queue-provisioning-${AWS::AccountId}-${Environment}-${DeployId}'
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Function: !GetAtt ProvisioningLambda.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: '.csv'
                  - Name: prefix
                    Value: 'uploads/'

  # ---------------------------------------------------------------------------
  # Create uploads/ folder in S3
  # ---------------------------------------------------------------------------
  S3FolderCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3PutObject
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${ProvisioningBucket.Arn}/*'

  S3FolderCreatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'connect-s3-folder-creator-${Environment}-${DeployId}'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt S3FolderCreatorRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              if event['RequestType'] in ['Create', 'Update']:
                  try:
                      bucket = event['ResourceProperties']['Bucket']
                      folder = event['ResourceProperties']['Folder']
                      boto3.client('s3').put_object(Bucket=bucket, Key=folder)
                  except Exception as e:
                      print(f"Error: {e}")
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  CreateUploadsFolder:
    Type: Custom::S3Folder
    DependsOn: ProvisioningBucket
    Properties:
      ServiceToken: !GetAtt S3FolderCreatorFunction.Arn
      Bucket: !Ref ProvisioningBucket
      Folder: 'uploads/'

  # ---------------------------------------------------------------------------
  # Query Lambda Role
  # ---------------------------------------------------------------------------
  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource: !GetAtt QueueMetadataTable.Arn

  # ---------------------------------------------------------------------------
  # Query Lambda Function
  # ---------------------------------------------------------------------------
  QueryLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'connect-queue-query-${Environment}-${DeployId}'
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 30
      Role: !GetAtt QueryLambdaRole.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref QueueMetadataTable
      Code:
        ZipFile: |
          import boto3
          import json
          import logging
          import os
          import re
          from decimal import Decimal
          from boto3.dynamodb.conditions import Attr

          logger = logging.getLogger()
          logger.setLevel(logging.ERROR)

          table = boto3.resource('dynamodb').Table(os.environ['DYNAMODB_TABLE_NAME'])


          def to_str(val):
              if isinstance(val, Decimal):
                  return str(int(val)) if val == int(val) else str(val)
              return str(val) if val is not None else ''


          def item_to_response(item):
              return {k: to_str(v) for k, v in item.items()}


          def lambda_handler(event, context):
              try:
                  if 'Details' in event:
                      params = event['Details'].get('Parameters', {})
                      op = params.get('Operation', 'get_queue')
                  else:
                      params = event
                      op = event.get('operation', 'get_queue')

                  if op == 'get_queue':
                      name = params.get('QueueName') or params.get('queue_name')
                      if not name:
                          return {'Found': 'false', 'Error': 'QueueName required'}
                      resp = table.get_item(Key={'QueueName': name})
                      if 'Item' not in resp:
                          return {'Found': 'false'}
                      result = item_to_response(resp['Item'])
                      result['Found'] = 'true'
                      return result

                  elif op == 'list_queues':
                      limit = int(params.get('limit', 100))
                      resp = table.scan(Limit=limit)
                      queues = [item_to_response(i) for i in resp.get('Items', [])]
                      return {'Count': str(len(queues)), 'Queues': json.dumps(queues)}

                  elif op == 'search_by_phone':
                      phone = params.get('PhoneNumber') or params.get('phone_number')
                      if not phone:
                          return {'Found': 'false', 'Error': 'PhoneNumber required'}
                      normalized = re.sub(r'[^\d+]', '', phone)
                      if not normalized.startswith('+'):
                          normalized = f"+{normalized}"
                      resp = table.scan(FilterExpression=Attr('PhoneNumberE164').eq(normalized), Limit=1)
                      items = resp.get('Items', [])
                      if not items:
                          return {'Found': 'false'}
                      result = item_to_response(items[0])
                      result['Found'] = 'true'
                      return result

                  return {'Found': 'false', 'Error': 'Unknown operation'}
              except Exception as e:
                  logger.error(f"Error: {e}")
                  return {'Found': 'false', 'Error': str(e)}

  # ---------------------------------------------------------------------------
  # Connect Lambda Permission
  # ---------------------------------------------------------------------------
  QueryLambdaConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QueryLambda
      Action: lambda:InvokeFunction
      Principal: connect.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Ref ConnectInstanceArn

  # ---------------------------------------------------------------------------
  # Connect Integration
  # ---------------------------------------------------------------------------
  ConnectIntegration:
    Type: AWS::Connect::IntegrationAssociation
    Properties:
      InstanceId: !Ref ConnectInstanceArn
      IntegrationType: LAMBDA_FUNCTION
      IntegrationArn: !GetAtt QueryLambda.Arn

  # ---------------------------------------------------------------------------
  # Queue Transfer Contact Flow
  # ---------------------------------------------------------------------------
  QueueTransferFlow:
    Type: AWS::Connect::ContactFlow
    DependsOn: ConnectIntegration
    Properties:
      InstanceArn: !Ref ConnectInstanceArn
      Name: !Sub 'Queue Transfer Flow - ${Environment}-${DeployId}'
      Description: Looks up queue metadata via Lambda and transfers to phone or queue
      Type: QUEUE_TRANSFER
      State: ACTIVE
      Content: !Sub |
        {
          "Version": "2019-10-30",
          "StartAction": "Logging",
          "Metadata": {
            "entryPointPosition": {"x": -19.2, "y": 17.6},
            "ActionMetadata": {
              "EndFlow": {"position": {"x": 1200, "y": 400}, "isFriendlyName": true},
              "Logging": {"position": {"x": 6.4, "y": 222.4}, "isFriendlyName": true},
              "LambdaFunctionAttribute": {"position": {"x": 197.6, "y": 25.6}, "isFriendlyName": true},
              "LookupQueue": {
                "position": {"x": 472, "y": 269.6},
                "isFriendlyName": true,
                "parameters": {"LambdaFunctionARN": {"useDynamic": true}, "LambdaInvocationAttributes": {"QueueName": {"useDynamic": true}}},
                "dynamicMetadata": {"Operation": false, "QueueName": true},
                "useDynamic": true
              },
              "CheckFound": {"position": {"x": 700, "y": 260}, "isFriendlyName": true},
              "CheckTransferType": {"position": {"x": 900, "y": 200}, "isFriendlyName": true},
              "TransferToPhone": {
                "position": {"x": 1150, "y": 50},
                "isFriendlyName": true,
                "parameters": {"ThirdPartyPhoneNumber": {"countryCode": "", "useDynamic": true}}
              },
              "Disconnect": {"position": {"x": 1200, "y": 550}, "isFriendlyName": true}
            },
            "Annotations": [],
            "name": "Queue Transfer Flow - ${Environment}-${DeployId}",
            "description": "Looks up queue metadata via Lambda and transfers to phone or queue",
            "type": "queueTransfer",
            "status": "published",
            "hash": {}
          },
          "Actions": [
            {
              "Parameters": {},
              "Identifier": "EndFlow",
              "Type": "EndFlowExecution",
              "Transitions": {}
            },
            {
              "Parameters": {"FlowLoggingBehavior": "Enabled"},
              "Identifier": "Logging",
              "Type": "UpdateFlowLoggingBehavior",
              "Transitions": {"NextAction": "LambdaFunctionAttribute"}
            },
            {
              "Parameters": {"FlowAttributes": {"LambdaARN": {"Value": "${QueryLambda.Arn}"}}},
              "Identifier": "LambdaFunctionAttribute",
              "Type": "UpdateFlowAttributes",
              "Transitions": {
                "NextAction": "LookupQueue",
                "Errors": [{"NextAction": "Disconnect", "ErrorType": "NoMatchingError"}]
              }
            },
            {
              "Parameters": {
                "LambdaFunctionARN": "$.FlowAttributes.LambdaARN",
                "InvocationTimeLimitSeconds": "3",
                "InvocationType": "SYNCHRONOUS",
                "LambdaInvocationAttributes": {"Operation": "get_queue", "QueueName": "$.Queue.Name"},
                "ResponseValidation": {"ResponseType": "STRING_MAP"}
              },
              "Identifier": "LookupQueue",
              "Type": "InvokeLambdaFunction",
              "Transitions": {
                "NextAction": "CheckFound",
                "Errors": [{"NextAction": "Disconnect", "ErrorType": "NoMatchingError"}]
              }
            },
            {
              "Parameters": {"ComparisonValue": "$.External.Found"},
              "Identifier": "CheckFound",
              "Type": "Compare",
              "Transitions": {
                "NextAction": "EndFlow",
                "Conditions": [{"NextAction": "CheckTransferType", "Condition": {"Operator": "Equals", "Operands": ["true"]}}],
                "Errors": [{"NextAction": "EndFlow", "ErrorType": "NoMatchingCondition"}]
              }
            },
            {
              "Parameters": {"ComparisonValue": "$.External.TransferType"},
              "Identifier": "CheckTransferType",
              "Type": "Compare",
              "Transitions": {
                "NextAction": "Disconnect",
                "Conditions": [
                  {"NextAction": "TransferToPhone", "Condition": {"Operator": "Equals", "Operands": ["PHONE"]}},
                  {"NextAction": "EndFlow", "Condition": {"Operator": "Equals", "Operands": ["QUEUE"]}}
                ],
                "Errors": [{"NextAction": "Disconnect", "ErrorType": "NoMatchingCondition"}]
              }
            },
            {
              "Parameters": {"ThirdPartyPhoneNumber": "$.External.PhoneNumberE164", "ThirdPartyConnectionTimeLimitSeconds": "30", "ContinueFlowExecution": "False", "CallerId": {"Number": "$.External.CallerIdE164"}},
              "Identifier": "TransferToPhone",
              "Type": "TransferParticipantToThirdParty",
              "Transitions": {
                "NextAction": "Disconnect",
                "Errors": [{"NextAction": "Disconnect", "ErrorType": "NoMatchingError"}]
              }
            },
            {
              "Parameters": {},
              "Identifier": "Disconnect",
              "Type": "DisconnectParticipant",
              "Transitions": {}
            }
          ]
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  BucketName:
    Description: S3 bucket for CSV uploads
    Value: !Ref ProvisioningBucket
  
  UploadPath:
    Description: S3 path for uploading CSV files
    Value: !Sub 's3://${ProvisioningBucket}/uploads/'
  
  DynamoDBTable:
    Description: DynamoDB table for queue metadata
    Value: !Ref QueueMetadataTable
  
  ProvisioningLambdaArn:
    Description: ARN of the provisioning Lambda
    Value: !GetAtt ProvisioningLambda.Arn
  
  QueryLambdaArn:
    Description: ARN of the query Lambda
    Value: !GetAtt QueryLambda.Arn
  
  QueueTransferFlowArn:
    Description: ARN of the Queue Transfer contact flow
    Value: !GetAtt QueueTransferFlow.ContactFlowArn